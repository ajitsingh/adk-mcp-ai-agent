sources:
  my-bq-source:
    kind: bigquery
    project: adk-mcp-ai-agent

tools:
  search_release_notes_bq:
    kind: bigquery-sql
    source: my-bq-source
    description: Search recent Google Cloud release notes from the public BigQuery dataset.
    statement: |
      SELECT
        product_name,
        title,
        published_at,
        preview
      FROM `bigquery-public-data.google_cloud_release_notes.release_notes`
      WHERE
        DATE(published_at) >= DATE_SUB(CURRENT_DATE(), INTERVAL 30 DAY)
        AND (
          LOWER(product_name) LIKE CONCAT('%', LOWER(@topic), '%')
          OR LOWER(title) LIKE CONCAT('%', LOWER(@topic), '%')
          OR LOWER(preview) LIKE CONCAT('%', LOWER(@topic), '%')
        )
      ORDER BY published_at DESC
      LIMIT 5
    parameters:
      - name: topic
        type: string
        description: Topic to search in release notes